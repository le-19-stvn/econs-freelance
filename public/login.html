<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>eCons Freelance — Connexion</title>
  <meta name="description" content="Connectez-vous à votre espace eCons Freelance pour gérer vos clients, projets et factures.">

  <script src="https://cdn.tailwindcss.com">
  </script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'navy': { 800: '#0c1425', 900: '#080e1c', 950: '#040714' },
            'electric': { DEFAULT: '#3366FF', light: '#5b8aff' },
            'accent-cyan': '#00D4FF',
            'accent-green': '#10B981',
            'accent-red': '#EF4444',
          },
          fontFamily: { inter: ['Inter', 'sans-serif'] },
        },
      },
    };
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
    @keyframes glow-pulse { 0%, 100% { box-shadow: 0 0 20px rgba(51,102,255,0.3); } 50% { box-shadow: 0 0 40px rgba(51,102,255,0.6); } }
    .animate-float { animation: float 6s ease-in-out infinite; }
    .animate-glow { animation: glow-pulse 3s ease-in-out infinite; }
  </style>
</head>
<body class="bg-navy-950 text-white font-inter min-h-screen flex items-center justify-center relative overflow-hidden">

  <!-- Background decorations -->
  <div class="absolute top-0 left-0 w-full h-full pointer-events-none">
    <div class="absolute top-[-200px] left-[-200px] w-[600px] h-[600px] bg-electric/5 rounded-full blur-3xl"></div>
    <div class="absolute bottom-[-200px] right-[-200px] w-[500px] h-[500px] bg-accent-cyan/5 rounded-full blur-3xl"></div>
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-electric/[0.02] rounded-full blur-3xl"></div>
  </div>

  <!-- Login Card -->
  <div class="relative z-10 w-full max-w-md mx-4">
    <!-- Logo -->
    <div class="flex flex-col items-center mb-8 animate-float">
      <img src="/logo_freelance.png" alt="eCons Freelance" class="w-16 h-16 object-contain rounded-2xl shadow-lg shadow-blue-500/20 mb-4">
      <h1 class="text-2xl font-bold text-white/90">eCons Freelance</h1>
      <p class="text-sm text-white/40 mt-1">Gérez vos clients, projets et factures</p>
    </div>

    <!-- Card -->
    <div class="bg-white/[0.04] backdrop-blur-xl border border-white/[0.07] rounded-3xl p-8 shadow-2xl">

      <!-- Tabs -->
      <div class="flex mb-8 bg-white/[0.04] rounded-2xl p-1">
        <button id="tab-login" onclick="switchTab('login')" class="flex-1 py-2.5 rounded-xl text-sm font-semibold transition-all duration-300 bg-electric/20 text-electric-light">
          Connexion
        </button>
        <button id="tab-register" onclick="switchTab('register')" class="flex-1 py-2.5 rounded-xl text-sm font-semibold transition-all duration-300 text-white/40 hover:text-white/60">
          Inscription
        </button>
      </div>

      <!-- Google OAuth -->
      <button onclick="handleGoogleLogin()" id="btn-google" class="w-full flex items-center justify-center gap-3 bg-white/[0.06] border border-white/[0.1] rounded-2xl px-6 py-3 hover:bg-white/[0.12] hover:border-white/[0.2] transition-all duration-300 active:scale-[0.97] mb-6 group">
        <svg class="w-5 h-5" viewBox="0 0 24 24">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        <span class="text-sm font-medium text-white/70 group-hover:text-white transition-colors">Continuer avec Google</span>
      </button>

      <!-- Divider -->
      <div class="flex items-center gap-3 mb-6">
        <div class="flex-1 h-px bg-white/[0.08]"></div>
        <span class="text-xs text-white/30">ou par email</span>
        <div class="flex-1 h-px bg-white/[0.08]"></div>
      </div>

      <!-- Error message -->
      <div id="auth-error" class="hidden mb-4 px-4 py-3 rounded-2xl bg-accent-red/10 border border-accent-red/20 text-accent-red text-sm"></div>
      <!-- Success message -->
      <div id="auth-success" class="hidden mb-4 px-4 py-3 rounded-2xl bg-accent-green/10 border border-accent-green/20 text-accent-green text-sm"></div>

      <!-- Login Form -->
      <form id="form-login" onsubmit="handleLogin(event)" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-white/60 mb-1.5">Email</label>
          <input type="email" id="login-email" required placeholder="freelance@email.com"
            class="w-full px-4 py-3 rounded-2xl bg-white/[0.05] border border-white/[0.1] text-white placeholder-white/30 outline-none focus:border-electric/50 focus:bg-white/[0.08] transition-all duration-300 text-sm">
        </div>
        <div>
          <label class="block text-sm font-medium text-white/60 mb-1.5">Mot de passe</label>
          <input type="password" id="login-password" required placeholder="••••••••" minlength="6"
            class="w-full px-4 py-3 rounded-2xl bg-white/[0.05] border border-white/[0.1] text-white placeholder-white/30 outline-none focus:border-electric/50 focus:bg-white/[0.08] transition-all duration-300 text-sm">
        </div>
        <button type="submit" id="btn-login" class="w-full bg-gradient-to-r from-electric to-electric-light text-white font-semibold rounded-2xl px-6 py-3 hover:shadow-[0_0_24px_rgba(51,102,255,0.45)] transition-all duration-300 active:scale-[0.97] animate-glow">
          Se connecter
        </button>
      </form>

      <!-- Register Form (hidden) -->
      <form id="form-register" onsubmit="handleRegister(event)" class="space-y-5 hidden">
        <div>
          <label class="block text-sm font-medium text-white/60 mb-1.5">Email</label>
          <input type="email" id="register-email" required placeholder="freelance@email.com"
            class="w-full px-4 py-3 rounded-2xl bg-white/[0.05] border border-white/[0.1] text-white placeholder-white/30 outline-none focus:border-electric/50 focus:bg-white/[0.08] transition-all duration-300 text-sm">
        </div>
        <div>
          <label class="block text-sm font-medium text-white/60 mb-1.5">Mot de passe</label>
          <input type="password" id="register-password" required placeholder="Minimum 6 caractères" minlength="6"
            class="w-full px-4 py-3 rounded-2xl bg-white/[0.05] border border-white/[0.1] text-white placeholder-white/30 outline-none focus:border-electric/50 focus:bg-white/[0.08] transition-all duration-300 text-sm">
        </div>
        <div>
          <label class="block text-sm font-medium text-white/60 mb-1.5">Confirmer le mot de passe</label>
          <input type="password" id="register-confirm" required placeholder="••••••••" minlength="6"
            class="w-full px-4 py-3 rounded-2xl bg-white/[0.05] border border-white/[0.1] text-white placeholder-white/30 outline-none focus:border-electric/50 focus:bg-white/[0.08] transition-all duration-300 text-sm">
        </div>
        <button type="submit" id="btn-register" class="w-full bg-gradient-to-r from-accent-cyan to-electric text-white font-semibold rounded-2xl px-6 py-3 hover:shadow-[0_0_24px_rgba(0,212,255,0.35)] transition-all duration-300 active:scale-[0.97]">
          Créer mon compte
        </button>
      </form>
    </div>

    <p class="text-center text-white/20 text-xs mt-6">eCons Freelance — Dashboard Freelance</p>
  </div>

  <script>
    let supabase = null;

    // Initialize Supabase from backend config
    async function initSupabase() {
      try {
        const res = await fetch('/api/config');
        const config = await res.json();
        if (config.supabaseUrl && config.supabaseAnonKey) {
          supabase = window.supabase.createClient(config.supabaseUrl, config.supabaseAnonKey);
          // Check if already logged in
          const { data: { session } } = await supabase.auth.getSession();
          if (session) {
            window.location.href = '/';
          }
        } else {
          showError('Configuration Supabase manquante. Contactez l\'administrateur.');
        }
      } catch (e) {
        showError('Impossible de charger la configuration.');
      }
    }

    function switchTab(tab) {
      const loginTab = document.getElementById('tab-login');
      const registerTab = document.getElementById('tab-register');
      const loginForm = document.getElementById('form-login');
      const registerForm = document.getElementById('form-register');

      hideMessages();

      if (tab === 'login') {
        loginTab.className = 'flex-1 py-2.5 rounded-xl text-sm font-semibold transition-all duration-300 bg-electric/20 text-electric-light';
        registerTab.className = 'flex-1 py-2.5 rounded-xl text-sm font-semibold transition-all duration-300 text-white/40 hover:text-white/60';
        loginForm.classList.remove('hidden');
        registerForm.classList.add('hidden');
      } else {
        registerTab.className = 'flex-1 py-2.5 rounded-xl text-sm font-semibold transition-all duration-300 bg-accent-cyan/20 text-accent-cyan';
        loginTab.className = 'flex-1 py-2.5 rounded-xl text-sm font-semibold transition-all duration-300 text-white/40 hover:text-white/60';
        registerForm.classList.remove('hidden');
        loginForm.classList.add('hidden');
      }
    }

    function showError(msg) {
      const el = document.getElementById('auth-error');
      el.textContent = msg;
      el.classList.remove('hidden');
      document.getElementById('auth-success').classList.add('hidden');
    }

    function showSuccess(msg) {
      const el = document.getElementById('auth-success');
      el.textContent = msg;
      el.classList.remove('hidden');
      document.getElementById('auth-error').classList.add('hidden');
    }

    function hideMessages() {
      document.getElementById('auth-error').classList.add('hidden');
      document.getElementById('auth-success').classList.add('hidden');
    }

    async function handleLogin(e) {
      e.preventDefault();
      hideMessages();
      const btn = document.getElementById('btn-login');
      btn.textContent = 'Connexion...';
      btn.disabled = true;

      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;

      const { data, error } = await supabase.auth.signInWithPassword({ email, password });

      if (error) {
        showError(error.message === 'Invalid login credentials' ? 'Email ou mot de passe incorrect.' : error.message);
        btn.textContent = 'Se connecter';
        btn.disabled = false;
        return;
      }

      window.location.href = '/';
    }

    async function handleRegister(e) {
      e.preventDefault();
      hideMessages();
      const btn = document.getElementById('btn-register');
      btn.textContent = 'Création...';
      btn.disabled = true;

      const email = document.getElementById('register-email').value;
      const password = document.getElementById('register-password').value;
      const confirm = document.getElementById('register-confirm').value;

      if (password !== confirm) {
        showError('Les mots de passe ne correspondent pas.');
        btn.textContent = 'Créer mon compte';
        btn.disabled = false;
        return;
      }

      const { data, error } = await supabase.auth.signUp({ email, password });

      if (error) {
        showError(error.message);
        btn.textContent = 'Créer mon compte';
        btn.disabled = false;
        return;
      }

      if (data.user && !data.session) {
        showSuccess('Compte créé ! Vérifiez votre email pour confirmer votre inscription.');
      } else {
        window.location.href = '/';
      }

      btn.textContent = 'Créer mon compte';
      btn.disabled = false;
    }

    async function handleGoogleLogin() {
      hideMessages();
      const btn = document.getElementById('btn-google');
      btn.disabled = true;
      btn.style.opacity = '0.5';

      const { data, error } = await supabase.auth.signInWithOAuth({
        provider: 'google',
        options: {
          redirectTo: window.location.origin + '/',
        },
      });

      if (error) {
        showError(error.message);
        btn.disabled = false;
        btn.style.opacity = '1';
      }
      // If no error, the browser redirects to Google — no further action needed
    }

    initSupabase();
  </script>
</body>
</html>
