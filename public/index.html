<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Antigravity — Dashboard Freelance</title>
  <meta name="description" content="Dashboard freelance pour gérer vos clients, projets et factures">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            inter: ['Inter', 'system-ui', 'sans-serif'],
          },
          colors: {
            navy: {
              950: '#040714',
              900: '#0a0e27',
              800: '#0f1535',
              700: '#151d3b',
              600: '#1c2951',
              500: '#253466',
            },
            electric: {
              DEFAULT: '#3366FF',
              light: '#5588FF',
              dark: '#2244DD',
              glow: 'rgba(51,102,255,0.4)',
            },
            accent: {
              cyan: '#00D4FF',
              green: '#00E676',
              red: '#FF5252',
              orange: '#FFB74D',
              purple: '#B388FF',
            },
          },
          animation: {
            'glow': 'glowPulse 2.5s ease-in-out infinite',
            'fade-in': 'fadeIn 0.4s ease-out',
            'slide-up': 'slideUp 0.5s cubic-bezier(0.22,1,0.36,1)',
            'slide-up-2': 'slideUp 0.6s cubic-bezier(0.22,1,0.36,1) 0.1s both',
            'slide-up-3': 'slideUp 0.7s cubic-bezier(0.22,1,0.36,1) 0.2s both',
            'scale-in': 'scaleIn 0.3s cubic-bezier(0.22,1,0.36,1)',
          },
          keyframes: {
            glowPulse: {
              '0%, 100%': { boxShadow: '0 0 8px rgba(51,102,255,0.3), 0 0 0px rgba(51,102,255,0)' },
              '50%': { boxShadow: '0 0 20px rgba(51,102,255,0.5), 0 0 40px rgba(51,102,255,0.15)' },
            },
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            slideUp: {
              '0%': { opacity: '0', transform: 'translateY(24px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            scaleIn: {
              '0%': { opacity: '0', transform: 'translate(-50%,-50%) scale(0.92)' },
              '100%': { opacity: '1', transform: 'translate(-50%,-50%) scale(1)' },
            },
          },
        },
      },
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.2/html2pdf.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-navy-950 text-white font-inter min-h-screen antialiased">

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- SIDEBAR                                                        -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <aside id="sidebar" class="fixed left-0 top-0 h-screen w-[78px] bg-navy-900/70 backdrop-blur-2xl border-r border-white/[0.06] flex flex-col items-center py-6 z-50">
    <!-- Logo -->
    <button onclick="navigate('dashboard')" class="mb-10 hover:scale-105 transition-transform duration-300" title="Retour au Dashboard">
      <img src="/logo_freelance.png" alt="eCons Freelance Logo" class="w-10 h-10 object-contain rounded-xl mx-auto shadow-lg shadow-blue-500/20">
    </button>

    <!-- Navigation -->
    <nav class="flex-1 flex flex-col items-center gap-1.5">
      <button onclick="navigate('dashboard')" data-nav="dashboard" class="nav-btn group relative w-12 h-12 rounded-2xl flex items-center justify-center transition-all duration-300 hover:bg-white/[0.08]" title="Dashboard">
        <svg class="w-[22px] h-[22px] text-white/40 group-hover:text-white transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/>
        </svg>
      </button>

      <button onclick="navigate('clients')" data-nav="clients" class="nav-btn group relative w-12 h-12 rounded-2xl flex items-center justify-center transition-all duration-300 hover:bg-white/[0.08]" title="Clients">
        <svg class="w-[22px] h-[22px] text-white/40 group-hover:text-white transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z"/>
        </svg>
      </button>

      <button onclick="navigate('projets')" data-nav="projets" class="nav-btn group relative w-12 h-12 rounded-2xl flex items-center justify-center transition-all duration-300 hover:bg-white/[0.08]" title="Projets">
        <svg class="w-[22px] h-[22px] text-white/40 group-hover:text-white transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12.75V12A2.25 2.25 0 014.5 9.75h15A2.25 2.25 0 0121.75 12v.75m-8.69-6.44l-2.12-2.12a1.5 1.5 0 00-1.061-.44H4.5A2.25 2.25 0 002.25 6v12a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9a2.25 2.25 0 00-2.25-2.25h-5.379a1.5 1.5 0 01-1.06-.44z"/>
        </svg>
      </button>

      <button onclick="navigate('factures')" data-nav="factures" class="nav-btn group relative w-12 h-12 rounded-2xl flex items-center justify-center transition-all duration-300 hover:bg-white/[0.08]" title="Factures">
        <svg class="w-[22px] h-[22px] text-white/40 group-hover:text-white transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/>
        </svg>
      </button>
    </nav>

    <!-- Bottom actions -->
    <div class="flex flex-col items-center gap-2">
      <!-- User Avatar -->
      <div id="user-avatar" class="w-10 h-10 rounded-2xl bg-gradient-to-br from-electric to-accent-cyan flex items-center justify-center text-sm font-bold text-white shadow-lg shadow-electric/20 mb-1 cursor-pointer overflow-hidden" title="Mon Profil" onclick="navigate('profil')">
        ?
      </div>
      <button class="group w-12 h-12 rounded-2xl flex items-center justify-center transition-all duration-300 hover:bg-white/[0.08]" title="Paramètres">
        <svg class="w-[22px] h-[22px] text-white/30 group-hover:text-white/60 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.24-.438.613-.431.992a6.759 6.759 0 010 .255c-.007.378.138.75.43.99l1.005.828c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 010-.255c.007-.378-.138-.75-.43-.99l-1.004-.828a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.281z"/>
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
      </button>
      <!-- Logout -->
      <button onclick="signOut()" class="group w-12 h-12 rounded-2xl flex items-center justify-center transition-all duration-300 hover:bg-red-500/10" title="Déconnexion">
        <svg class="w-[22px] h-[22px] text-white/30 group-hover:text-red-400 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9"/>
        </svg>
      </button>
    </div>
  </aside>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- MAIN CONTENT                                                   -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <main class="ml-[78px] min-h-screen">
    <!-- Header -->
    <header class="sticky top-0 z-40 px-8 py-4 bg-navy-950/70 backdrop-blur-xl border-b border-white/[0.04] flex items-center justify-between">
      <div class="flex items-center gap-6">
        <div class="relative">
          <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-white/30" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/>
          </svg>
          <input id="search-input" type="text" placeholder="Rechercher..." class="w-64 pl-10 pr-4 py-2.5 rounded-2xl bg-white/[0.05] border border-white/[0.08] text-sm text-white placeholder-white/30 outline-none focus:border-electric/40 focus:bg-white/[0.07] transition-all duration-300">
        </div>
        <h1 id="page-title" class="text-lg font-semibold text-white/90">Dashboard</h1>
      </div>
      <div class="flex items-center gap-4">
        <!-- Notification bell -->
        <button class="relative w-10 h-10 rounded-2xl bg-white/[0.05] border border-white/[0.08] flex items-center justify-center hover:bg-white/[0.1] transition-all duration-300">
          <svg class="w-[18px] h-[18px] text-white/50" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 005.454-1.31A8.967 8.967 0 0118 9.75v-.7V9A6 6 0 006 9v.75a8.967 8.967 0 01-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 01-5.714 0m5.714 0a3 3 0 11-5.714 0"/>
          </svg>
          <span id="notif-badge" class="hidden absolute -top-1 -right-1 w-5 h-5 rounded-full bg-accent-orange text-[10px] font-bold flex items-center justify-center">0</span>
        </button>
        <!-- User avatar + dropdown -->
        <div class="relative pl-4 border-l border-white/[0.08]">
          <button onclick="toggleProfileMenu(event)" id="profile-btn" class="flex items-center gap-3 hover:opacity-80 transition-opacity duration-200 cursor-pointer">
            <div id="header-avatar" class="w-9 h-9 rounded-full bg-gradient-to-br from-electric to-accent-purple flex items-center justify-center text-sm font-bold overflow-hidden">?</div>
            <div class="hidden lg:flex items-center gap-2">
              <div>
                <p id="header-user-name" class="text-sm font-medium text-white/90 text-left">Chargement...</p>
                <p id="header-user-email" class="text-[11px] text-white/40 text-left">...</p>
              </div>
              <svg class="w-4 h-4 text-white/30 transition-transform duration-200" id="profile-chevron" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5"/></svg>
            </div>
          </button>
          <!-- Dropdown -->
          <div id="profile-dropdown" class="hidden absolute right-0 top-full mt-3 w-56 bg-navy-800/80 backdrop-blur-2xl border border-white/[0.08] rounded-2xl shadow-2xl shadow-black/40 overflow-hidden animate-fade-in z-50">
            <div class="px-5 py-4 border-b border-white/[0.06]">
              <p id="dropdown-user-name" class="text-sm font-semibold text-white/90">Utilisateur</p>
              <p id="dropdown-user-email" class="text-xs text-white/40 mt-0.5">email@example.com</p>
            </div>
            <div class="py-1.5">
              <button onclick="profileAction('profil')" class="w-full flex items-center gap-3 px-5 py-2.5 text-sm text-white/70 hover:text-white hover:bg-white/[0.06] transition-all duration-200">
                <svg class="w-[18px] h-[18px] text-white/40" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/></svg>
                Mon Profil
              </button>
              <button onclick="profileAction('parametres')" class="w-full flex items-center gap-3 px-5 py-2.5 text-sm text-white/70 hover:text-white hover:bg-white/[0.06] transition-all duration-200">
                <svg class="w-[18px] h-[18px] text-white/40" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.24-.438.613-.431.992a6.759 6.759 0 010 .255c-.007.378.138.75.43.99l1.005.828c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 010-.255c.007-.378-.138-.75-.43-.99l-1.004-.828a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.281z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                Paramètres
              </button>
            </div>
            <div class="border-t border-white/[0.06] py-1.5">
              <button onclick="profileAction('deconnexion')" class="w-full flex items-center gap-3 px-5 py-2.5 text-sm text-accent-red/80 hover:text-accent-red hover:bg-accent-red/[0.06] transition-all duration-200">
                <svg class="w-[18px] h-[18px]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9"/></svg>
                Déconnexion
              </button>
            </div>
          </div>
        </div>
      </div>
    </header>

    <!-- App Content -->
    <div id="app-content" class="p-8">
      <!-- JavaScript renders views here -->
    </div>
  </main>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- MODAL OVERLAY                                                  -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <div id="modal-overlay" class="fixed inset-0 z-[100] hidden">
    <div class="absolute inset-0 bg-black/60 backdrop-blur-sm animate-fade-in" onclick="closeModal()"></div>
    <div id="modal-content" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full max-w-lg animate-scale-in"></div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- TOAST NOTIFICATIONS                                            -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <div id="toast-container" class="fixed bottom-6 right-6 z-[200] flex flex-col gap-3"></div>

  <script src="/js/supabase-auth.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script>
    // Auth guard + populate user info everywhere
    (async () => {
      const ok = await requireSession();
      if (!ok) return;

      try {
        const user = await getCurrentUser();
        if (!user) return;

        const meta = user.user_metadata || {};
        const avatarUrl = meta.avatar_url || meta.picture || '';
        const fullName = meta.full_name || meta.name || '';
        const email = user.email || '';
        const displayName = fullName || email.split('@')[0] || 'Freelancer';
        const initial = displayName.charAt(0).toUpperCase();

        // ── Sidebar avatar ──
        const sideAvatar = document.getElementById('user-avatar');
        if (sideAvatar) {
          if (avatarUrl) {
            sideAvatar.innerHTML = '<img src="' + avatarUrl + '" alt="' + displayName + '" class="w-full h-full object-cover">';
          } else {
            sideAvatar.textContent = initial;
          }
          sideAvatar.title = email;
        }

        // ── Header avatar ──
        const headerAvatar = document.getElementById('header-avatar');
        if (headerAvatar) {
          if (avatarUrl) {
            headerAvatar.innerHTML = '<img src="' + avatarUrl + '" alt="' + displayName + '" class="w-full h-full object-cover">';
          } else {
            headerAvatar.textContent = initial;
          }
        }

        // ── Header text ──
        const nameEl = document.getElementById('header-user-name');
        const emailEl = document.getElementById('header-user-email');
        if (nameEl) nameEl.textContent = displayName;
        if (emailEl) emailEl.textContent = email;

        // ── Dropdown text ──
        const dName = document.getElementById('dropdown-user-name');
        const dEmail = document.getElementById('dropdown-user-email');
        if (dName) dName.textContent = displayName;
        if (dEmail) dEmail.textContent = email;

      } catch (e) {
        console.error('User info error:', e);
      }
    })();
  </script>
</body>
</html>
